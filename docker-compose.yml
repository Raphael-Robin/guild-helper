services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env

    depends_on:
      mongo:
        condition: service_healthy

    networks:
      - bot_network

    read_only: true

    tmpfs:
      - /tmp

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    pids_limit: 100

    mem_limit: 512m

    cpus: 0.50

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongo:
    image: mongo:7
    restart: unless-stopped

    networks:
      - bot_network

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}

    volumes:
      - mongo_data:/data/db

    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "-u",
          "${MONGO_ROOT_USER}",
          "-p",
          "${MONGO_ROOT_PASSWORD}",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 30s
      timeout: 5s
      retries: 5

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    pids_limit: 100

    mem_limit: 512m

volumes:
  mongo_data:

networks:
  bot_network:
    driver: bridge
